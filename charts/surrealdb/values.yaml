# Default values for surrealdb.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- The number of SurrealDB pods to run
#
# Note that you usually scale this only when the backend supports it.
# For example, if you specify volumes and volumeMounts to make this SurrealDB
# instance stateful, you should not scale it, as it will result in two or more
# instances writing to the same volume or working independently.
# @section -- General parameters
replicaCount: 1

image:
  # -- Repository to use for SurrealDB
  # @section -- Image parameters
  repository: surrealdb/surrealdb
  # -- Image pull policy for SurrealDB
  # @section -- Image parameters
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  # -- Tag to use for SurrealDB
  # @default -- `""` (defaults to chart appVersion)
  # @section -- Image parameters
  tag: ""
# -- Secrets with credentials to pull images from a private registry
# @section -- Image parameters
imagePullSecrets: []

# -- Provide a name in place of `surrealdb`
# @section -- Overrides
nameOverride: ""
# -- String to fully override `"surrealdb"`
# @section -- Overrides
fullnameOverride: ""

# -- Command line arguments to pass to SurrealDB
# @section -- General parameters
args: [start]

surrealdb:
  # Datastore path
  #
  # * tikv example
  # -- path: tikv://tikv-pd:2379
  # @section -- SurrealDB parameters
  path: memory
  # -- Log configuration
  # @section -- SurrealDB parameters
  log: info
  # -- Initial user credentials
  # Set these values to bootstrap the datastore with an initial root user the first time you install the chart.
  # Remember to remove them after the first install, as they are no longer used:
  # initial_user: ""
  # initial_pass: ""
  # -- Enable unauthenticated access
  # Warning: Enabling it will allow any unauthenticated user to access SurrealDB!
  # Authentication is enabled by default in 2.x. This value replaces the depreacted "auth" value.
  # unauthenticated: false
  # -- DEPRECATED: Enable authentication
  # This value has been deprecated in 2.x but is kept for backward compatibility.
  # The "unauthenticated" value should now be used instead, which will be converted in 1.x deployments.
  # auth: true

  # -- SurrealDB container port
  # @section -- SurrealDB parameters
  port: 8000
  # Enable the following for jwks feature
  # object_cache: "file:/data/cache"
  # object_store: "file:/data/store"

# -- Set to `{"type":"Recreate"}` when the deployment has an RWO PV attached and replicas = 1.
# Otherwise, an update can get stuck, as the previous pod remains attached to the PV, and the "incoming" pod can never start.
# Changing the strategy to "Recreate" will terminate the single previous pod, so that the new, incoming pod can attach to the PV
# @section -- General parameters
strategy:
  type: RollingUpdate

serviceAccount:
  # -- Specifies whether a service account should be created
  # @section -- Service account parameters
  create: true
  # -- Annotations to add to the service account
  # @section -- Service account parameters
  annotations: {}
  # If not set and create is true, a name is generated using the fullname template
  # -- The name of the service account to use.
  # @default -- `""` (defaults to the fullname template)
  # @section -- Service account parameters
  name: ""

# -- Extra env entries added to the SurrealDB pods
# @section -- General parameters
podExtraEnv:
  []
  # - name: TZ
  #   value: "Europe/London"
  # - name: SURREAL_PASS
  #   valueFrom:
  #     secretKeyRef:
  #       name: creds
  #       key: password

# -- Annotations to be added to SurrealDB pods
# @section -- General parameters
podAnnotations: {}

# -- Toggle and define pod-level security context.
# @default -- `{}` (See [values.yaml])
# @section -- General parameters
podSecurityContext: {}
#  runAsUser: 999
#  runAsGroup: 999
#  fsGroup: 999

# -- SurrealDB container-level security context
# @default -- `{}` (See [values.yaml])
# @section -- General parameters
securityContext: {}
#  runAsNonRoot: true
#  readOnlyRootFilesystem: true
#  allowPrivilegeEscalation: false
#  seccompProfile:
#    type: RuntimeDefault
#  capabilities:
#    drop:
#      - ALL


# -- initContainers
# @section -- General parameters
initContainers: []

# -- for deploying of additional Containers
# @section -- General parameters
extraContainers: []

service:
  # -- Service annotations
  # @section -- Service parameters
  annotations: {}
  # -- Service type
  # @section -- Service parameters
  type: ClusterIP
  # -- Service port
  # @section -- Service parameters
  port: 8000
  # -- Target container port
  # @section -- Service parameters
  targetPort: http

ingress:
  # -- Enable an ingress resource
  # @section -- Ingress parameters
  enabled: false
  # -- Defines which ingress controller will implement the resource
  # @section -- Ingress parameters
  className: ""
  # -- Additional ingress annotations
  # @section -- Ingress parameters
  annotations: {}
  # -- List of hosts to be covered by ingress record
  # @default -- `[]` (See [values.yaml])
  # @section -- Ingress parameters
  hosts: []
  # - host: surreal.example.com
  #   paths:
  #     - path: /*
  #       pathType: Prefix

  # -- Create default backend
  # @section -- Ingress parameters
  defaultBackend: true
  # -- List of TLS configuration
  # @default -- `[]` (See [values.yaml])
  # @section -- Ingress parameters
  tls: []
  # - hosts:
  #   - surreal.example.com
  #   secretName: your-certificate-name

# -- Resource limits and requests
# @section -- General parameters
resources: {}
#  requests: {}
#  limits: {}

# -- Container lifecycle hooks (e.g. preStop / postStart). Optional; unset by default.
# The default surrealdb/surrealdb image has no shell, so exec hooks that invoke
# /bin/sh or sleep will fail unless you use a custom image that includes them.
# With the default image, prefer raising terminationGracePeriodSeconds so the
# kubelet gives the process more time to exit cleanly after SIGTERM (including
# RocksDB backends that may still be flushing). Sleep in a preStop hook only
# delays SIGTERM; it does not flush or compact RocksDB by itself.
# Example (requires an image with a shell):
#   lifecycle:
#     preStop:
#       exec:
#         command: ["/bin/sh", "-c", "sleep 60"]
# @section -- General parameters
lifecycle: {}

# -- Pod termination grace period in seconds (overrides the kubelet default of 30s).
# Raising this is the practical knob for graceful shutdown with the default image.
# Leave unset to use the kubelet default. Example: `terminationGracePeriodSeconds: 300`
# @default -- unset (kubelet default of 30s)
# @section -- General parameters
terminationGracePeriodSeconds: null

horizontalPodAutoscaler:
  # -- Enable the horizontal pod autoscaler for Surrealdb pods
  # @section -- General parameters
  enabled: false
  # -- Min pod replicas
  # @section -- General parameters
  minReplicas: 1
  # -- Max pod replicas
  # @section -- General parameters
  maxReplicas: 1
  # -- Metrics which the autoscaler reacts to. See [kubernetes autoscale docs](https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale-walkthrough/) for metric format.
  # @default -- `[]` (See [values.yaml])
  # @section -- General parameters
  metrics: []
  # - type: Resource
  #   resource:
  #     name: cpu
  #     target:
  #       type: Utilization
  #       averageUtilization: 80

# -- [Node selector]
# @section -- General parameters
nodeSelector: {}

# -- [Tolerations] for use with node taints
# @section -- General parameters
tolerations: []

# -- Assign custom [affinity] rules to the deployment
# @section -- General parameters
affinity: {}

# -- Additional volumes for SurrealDB pod
# @section -- General parameters
volumes: []

# -- Additional volume mounts for SurrealDB container
# @section -- General parameters
volumeMounts: []

# Persistence configuration for SurrealDB data
persistence:
  # -- Enable persistent storage
  # @section -- Persistence parameters
  enabled: false
  # -- Storage class name for the PVC
  # @default -- `""` (uses default storage class)
  # @section -- Persistence parameters
  storageClassName: ""
  # -- Access modes for the PVC
  # @section -- Persistence parameters
  accessModes:
    - ReadWriteOnce
  # -- Size of the persistent volume
  # @section -- Persistence parameters
  size: 10Gi
  # -- Annotations for the PVC
  # @section -- Persistence parameters
  annotations: {}
  # -- Selector to match an existing Persistent Volume
  # @default -- `{}` (no selector)
  # @section -- Persistence parameters
  selector: {}
  # -- Mount path for the persistent volume
  # @section -- Persistence parameters
  mountPath: /data

# -- Configure liveness probe
# @default -- See [values.yaml]
# @section -- General parameters
livenessProbe:
  httpGet:
    path: /health
    port: http
  timeoutSeconds: 5

# -- Configure readiness probe
# @default -- See [values.yaml]
# @section -- General parameters
readinessProbe:
  httpGet:
    path: /health
    port: http
  timeoutSeconds: 5
