# Default values for surrealdb.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# replicaCount -- The number of SurrealDB pods to run
#
# Note that you usually scale this only when the backend supports it.
# For example, if you specify volumes and volumeMounts to make this SurrealDB
# instance stateful, you should not scale it, as it will result in two or more
# instances writing to the same volume or working independently.
# @section -- General parameters
replicaCount: 1

# image --
image:
  # image.repository -- Repository to use for SurrealDB
  # @section -- Image parameters
  repository: surrealdb/surrealdb
  # image.pullPolicy -- Image pull policy for SurrealDB
  # @section -- Image parameters
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  # image.tag -- Tag to use for SurrealDB
  # @default -- `""` (defaults to chart appVersion)
  # @section -- Image parameters
  tag: ""
# imagePullSecrets -- Secrets with credentials to pull images from a private registry
# @section -- Image parameters
imagePullSecrets: []

# nameOverride -- Provide a name in place of `surrealdb`
# @section -- Overrides
nameOverride: ""
# fullnameOverride -- String to fully override `"surrealdb"`
# @section -- Overrides
fullnameOverride: ""

# args -- Command line arguments to pass to SurrealDB
# @section -- General parameters
args: [start]

# surrealdb --
surrealdb:
  # Datastore path
  #
  # * tikv example
  # surrealdb.path -- path: tikv://tikv-pd:2379
  # @section -- SurrealDB parameters
  path: memory
  # surrealdb.log -- Log configuration
  # @section -- SurrealDB parameters
  log: info
  # -- Initial user credentials
  # Set these values to bootstrap the datastore with an initial root user the first time you install the chart.
  # Remember to remove them after the first install, as they are no longer used:
  # initial_user: ""
  # initial_pass: ""
  # -- Enable unauthenticated access
  # Warning: Enabling it will allow any unauthenticated user to access SurrealDB!
  # Authentication is enabled by default in 2.x. This value replaces the depreacted "auth" value.
  # unauthenticated: false
  # -- DEPRECATED: Enable authentication
  # This value has been deprecated in 2.x but is kept for backward compatibility.
  # The "unauthenticated" value should now be used instead, which will be converted in 1.x deployments.
  # auth: true

  # surrealdb.port -- SurrealDB container port
  # @section -- SurrealDB parameters
  port: 8000
  # Enable the following for jwks feature
  # object_cache: "file:/data/cache"
  # object_store: "file:/data/store"

# strategy -- Set to `{"type":"Recreate"}` when the deployment has an RWO PV attached and replicas = 1.
# Otherwise, an update can get stuck, as the previous pod remains attached to the PV, and the "incoming" pod can never start.
# Changing the strategy to "Recreate" will terminate the single previous pod, so that the new, incoming pod can attach to the PV
# @section -- General parameters
strategy:
  # strategy.type --
  type: RollingUpdate

# serviceAccount --
serviceAccount:
  # serviceAccount.create -- Specifies whether a service account should be created
  # @section -- Service account parameters
  create: true
  # serviceAccount.annotations -- Annotations to add to the service account
  # @section -- Service account parameters
  annotations: {}
  # If not set and create is true, a name is generated using the fullname template
  # serviceAccount.name -- The name of the service account to use.
  # @default -- `""` (defaults to the fullname template)
  # @section -- Service account parameters
  name: ""

# podExtraEnv -- Extra env entries added to the SurrealDB pods
# @section -- General parameters
podExtraEnv:
  []
  # - name: TZ
  #   value: "Europe/London"
  # - name: SURREAL_PASS
  #   valueFrom:
  #     secretKeyRef:
  #       name: creds
  #       key: password

# podAnnotations -- Annotations to be added to SurrealDB pods
# @section -- General parameters
podAnnotations: {}

# podSecurityContext -- Toggle and define pod-level security context.
# @default -- `{}` (See [values.yaml])
# @section -- General parameters
podSecurityContext: {}
# Official surrealdb/surrealdb images run as USER nonroot (uid/gid 65532):
#   https://github.com/surrealdb/surrealdb/blob/main/docker/Dockerfile
# When persistence.enabled mounts a PVC over /data, many CSI/local-path
# provisioners create the volume as root:root, so the process cannot write
# (Permission denied). Set fsGroup to the image gid so Kubernetes chowns the
# volume for the nonroot group. See helm-charts#31 and surrealdb/surrealdb#6317.
#  fsGroup: 65532
#  runAsUser: 65532
#  runAsGroup: 65532

# securityContext -- SurrealDB container-level security context
# @default -- `{}` (See [values.yaml])
# @section -- General parameters
securityContext: {}
#  runAsNonRoot: true
#  readOnlyRootFilesystem: true
#  allowPrivilegeEscalation: false
#  seccompProfile:
#    type: RuntimeDefault
#  capabilities:
#    drop:
#      - ALL


# initContainers -- initContainers
# @section -- General parameters
initContainers: []

# extraContainers -- for deploying of additional Containers
# @section -- General parameters
extraContainers: []

# service --
service:
  # service.annotations -- Service annotations
  # @section -- Service parameters
  annotations: {}
  # service.type -- Service type
  # @section -- Service parameters
  type: ClusterIP
  # service.port -- Service port
  # @section -- Service parameters
  port: 8000
  # service.targetPort -- Target container port
  # @section -- Service parameters
  targetPort: http

# ingress --
ingress:
  # ingress.enabled -- Enable an ingress resource
  # @section -- Ingress parameters
  enabled: false
  # ingress.className -- Defines which ingress controller will implement the resource
  # @section -- Ingress parameters
  className: ""
  # ingress.annotations -- Additional ingress annotations
  # @section -- Ingress parameters
  annotations: {}
  # ingress.hosts -- List of hosts to be covered by ingress record
  # @default -- `[]` (See [values.yaml])
  # @section -- Ingress parameters
  hosts: []
  # - host: surreal.example.com
  #   paths:
  #     - path: /*
  #       pathType: Prefix

  # ingress.defaultBackend -- Create default backend
  # @section -- Ingress parameters
  defaultBackend: true
  # ingress.tls -- List of TLS configuration
  # @default -- `[]` (See [values.yaml])
  # @section -- Ingress parameters
  tls: []
  # - hosts:
  #   - surreal.example.com
  #   secretName: your-certificate-name

# resources -- Resource limits and requests
# @section -- General parameters
resources: {}
#  requests: {}
#  limits: {}

# lifecycle -- Container lifecycle hooks (e.g. preStop / postStart). Optional; unset by default.
# The default surrealdb/surrealdb image has no shell, so exec hooks that invoke
# /bin/sh or sleep will fail unless you use a custom image that includes them.
# With the default image, prefer raising terminationGracePeriodSeconds so the
# kubelet gives the process more time to exit cleanly after SIGTERM (including
# RocksDB backends that may still be flushing). Sleep in a preStop hook only
# delays SIGTERM; it does not flush or compact RocksDB by itself.
# Example (requires an image with a shell):
#   lifecycle:
#     preStop:
#       exec:
#         command: ["/bin/sh", "-c", "sleep 60"]
# @section -- General parameters
lifecycle: {}

# terminationGracePeriodSeconds -- Pod termination grace period in seconds (overrides the kubelet default of 30s).
# Raising this is the practical knob for graceful shutdown with the default image.
# Leave unset to use the kubelet default. Example: `terminationGracePeriodSeconds: 300`
# @default -- unset (kubelet default of 30s)
# @section -- General parameters
terminationGracePeriodSeconds: null

# horizontalPodAutoscaler --
horizontalPodAutoscaler:
  # horizontalPodAutoscaler.enabled -- Enable the horizontal pod autoscaler for Surrealdb pods
  # @section -- General parameters
  enabled: false
  # horizontalPodAutoscaler.minReplicas -- Min pod replicas
  # @section -- General parameters
  minReplicas: 1
  # horizontalPodAutoscaler.maxReplicas -- Max pod replicas
  # @section -- General parameters
  maxReplicas: 1
  # horizontalPodAutoscaler.metrics -- Metrics which the autoscaler reacts to. See [kubernetes autoscale docs](https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale-walkthrough/) for metric format.
  # @default -- `[]` (See [values.yaml])
  # @section -- General parameters
  metrics: []
  # - type: Resource
  #   resource:
  #     name: cpu
  #     target:
  #       type: Utilization
  #       averageUtilization: 80

# nodeSelector -- [Node selector]
# @section -- General parameters
nodeSelector: {}

# tolerations -- [Tolerations] for use with node taints
# @section -- General parameters
tolerations: []

# affinity -- Assign custom [affinity] rules to the deployment
# @section -- General parameters
affinity: {}

# volumes -- Additional volumes for SurrealDB pod
# @section -- General parameters
volumes: []

# volumeMounts -- Additional volume mounts for SurrealDB container
# @section -- General parameters
volumeMounts: []

# Persistence configuration for SurrealDB data
# persistence --
# Recommended with persistence.enabled:
#   strategy.type: Recreate          # RWO + single replica
#   surrealdb.path: surrealkv:/data  # or rocksdb:/data/...
#   podSecurityContext.fsGroup: 65532
# The official image USER is nonroot (65532); see
# https://github.com/surrealdb/surrealdb/blob/main/docker/Dockerfile
# Without fsGroup (or an initContainer chown), a root-owned PVC at mountPath
# often fails with Permission denied (helm-charts#31, surrealdb/surrealdb#6317).
persistence:
  # persistence.enabled -- Enable persistent storage
  # @section -- Persistence parameters
  enabled: false
  # persistence.storageClassName -- Storage class name for the PVC
  # @default -- `""` (uses default storage class)
  # @section -- Persistence parameters
  storageClassName: ""
  # persistence.accessModes -- Access modes for the PVC
  # @section -- Persistence parameters
  accessModes:
    - ReadWriteOnce
  # persistence.size -- Size of the persistent volume
  # @section -- Persistence parameters
  size: 10Gi
  # persistence.annotations -- Annotations for the PVC
  # @section -- Persistence parameters
  annotations: {}
  # persistence.selector -- Selector to match an existing Persistent Volume
  # @default -- `{}` (no selector)
  # @section -- Persistence parameters
  selector: {}
  # persistence.mountPath -- Mount path for the persistent volume
  # @section -- Persistence parameters
  mountPath: /data
  # Must match surrealdb.path. Image declares VOLUME /data; PVC replaces image
  # /data ownership — pair with podSecurityContext.fsGroup: 65532 (see
  # podSecurityContext comments and Dockerfile link above).

# livenessProbe -- Configure liveness probe
# @default -- See [values.yaml]
# @section -- General parameters
livenessProbe:
  # livenessProbe.httpGet --
  httpGet:
    # livenessProbe.httpGet.path --
    path: /health
    # livenessProbe.httpGet.port --
    port: http
  # livenessProbe.timeoutSeconds --
  timeoutSeconds: 5

# readinessProbe -- Configure readiness probe
# @default -- See [values.yaml]
# @section -- General parameters
readinessProbe:
  # readinessProbe.httpGet --
  httpGet:
    # readinessProbe.httpGet.path --
    path: /health
    # readinessProbe.httpGet.port --
    port: http
  # readinessProbe.timeoutSeconds --
  timeoutSeconds: 5
